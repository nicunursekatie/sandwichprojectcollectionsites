    <div id="root"></div>

    <script>
      (function () {
        const workingUrl = 'https://tsp-host-finder-tool.web.app/';
        const isGitHubHosted = window.location.hostname.endsWith('github.io');

        if (!isGitHubHosted) return;

        document.body.classList.add('github-host-disabled');

        const redirectNotice = document.createElement('div');
        redirectNotice.className = 'github-host-redirect';
        redirectNotice.setAttribute('role', 'alertdialog');
        redirectNotice.setAttribute('aria-modal', 'true');
        redirectNotice.setAttribute('aria-labelledby', 'github-host-redirect-title');
        redirectNotice.innerHTML = `
          <div class="github-host-redirect__panel">
            <p class="github-host-redirect__eyebrow">Old version</p>
            <h2 id="github-host-redirect-title">This Host Finder no longer works</h2>
            <p>Please use the current TSP Host Finder. You will be redirected automatically.</p>
            <a class="github-host-redirect__button" href="${workingUrl}">Go to the working Host Finder</a>
          </div>
        `;
        document.body.appendChild(redirectNotice);

        window.setTimeout(() => {
          window.location.replace(workingUrl);
        }, 3500);
      }());
    </script>
