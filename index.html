<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>This Host Finder has moved</title>
    <meta name="description" content="The Sandwich Project Host Finder has moved to a new address.">

    <!--
      This is the RETIRED GitHub Pages version of the Host Finder.
      The live tool lives at https://tsp-host-finder-tool.web.app/ (Firebase).
      This page intentionally does NOT load Firebase / Google Maps / the app,
      so it cannot produce Google API key errors. It just redirects.
    -->
    <script>
      (function () {
        var workingUrl = 'https://tsp-host-finder-tool.web.app/';
        // Carry over any query string / hash so shared deep links still work.
        window.location.replace(workingUrl + window.location.search + window.location.hash);
      })();
    </script>
    <!-- Fallback if JavaScript is disabled or the script-based redirect is blocked. -->
    <meta http-equiv="refresh" content="3; url=https://tsp-host-finder-tool.web.app/">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">

    <style>
      html, body {
        margin: 0;
        min-height: 100%;
      }

      body {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        background: #f3f4f6;
        font-family: "Plus Jakarta Sans", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .panel {
        width: min(100%, 560px);
        border-radius: 16px;
        background: #ffffff;
        color: #111827;
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.15);
        padding: 32px;
        text-align: center;
      }

      .panel__eyebrow {
        margin: 0 0 8px;
        color: #6b7280;
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .panel h1 {
        margin: 0 0 12px;
        color: #1f2937;
        font-size: clamp(24px, 5vw, 34px);
        line-height: 1.15;
      }

      .panel p {
        margin: 0 auto 24px;
        color: #4b5563;
        font-size: 16px;
        line-height: 1.55;
      }

      .panel__button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 48px;
        border-radius: 10px;
        background: #007e8c;
        color: #ffffff;
        padding: 0 24px;
        font-weight: 800;
        font-size: 16px;
        text-decoration: none;
      }
    </style>
</head>
<body>
    <div class="panel" role="alertdialog" aria-labelledby="redirect-title">
        <p class="panel__eyebrow">This version is no longer active</p>
        <h1 id="redirect-title">The Host Finder has moved</h1>
        <p>You're being redirected to the current Sandwich Project Host Finder. If nothing happens, use the button below.</p>
        <a class="panel__button" href="https://tsp-host-finder-tool.web.app/">Go to the Host Finder</a>
    </div>
</body>
</html>
