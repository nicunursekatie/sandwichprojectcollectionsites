<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Link Steffi M. as substitute for Renee V.</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 720px; margin: 40px auto; padding: 20px; background: #f5f5f5; }
        .container { background: white; padding: 24px; border-radius: 12px; }
        h1 { color: #236383; margin-top: 0; }
        button { background: #007E8C; color: white; padding: 12px 24px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        pre { background: #f9f9f9; padding: 14px; border-radius: 8px; white-space: pre-wrap; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Link Steffi → Renee (substitute host)</h1>
        <p>Sets <code>alternateFor: 18</code> on Steffi M. so the admin panel shows <strong>Substitute host for Renee V.</strong></p>
        <button id="runBtn">Find Steffi &amp; link to Renee</button>
        <pre id="output">Ready.</pre>
    </div>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script>
        firebase.initializeApp({
            apiKey: "AIzaSyAiv_SfZGBGzyw8dEypQIDXI2iB3WAKjXc",
            authDomain: "tsp-host-finder-tool.firebaseapp.com",
            projectId: "tsp-host-finder-tool",
            storageBucket: "tsp-host-finder-tool.firebasestorage.app",
            messagingSenderId: "773911012242",
            appId: "1:773911012242:web:60bc4f1fce3b494fb7974b"
        });
        const db = firebase.firestore();
        const RENEE_ID = 18;

        document.getElementById('runBtn').addEventListener('click', async () => {
            const output = document.getElementById('output');
            output.textContent = 'Searching hosts...\n';
            try {
                const snapshot = await db.collection('hosts').get();
                const steffiHosts = [];
                snapshot.forEach(doc => {
                    const data = doc.data();
                    if (/steffi/i.test(data.name || '')) {
                        steffiHosts.push({ id: data.id ?? Number(doc.id), ref: doc.ref, name: data.name, alternateFor: data.alternateFor });
                    }
                });

                if (steffiHosts.length === 0) {
                    output.textContent += 'No host matching "Steffi" found. Add her in Admin first, or edit her host and set Substitute host for → Renee V.';
                    return;
                }

                if (steffiHosts.length > 1) {
                    output.textContent += 'Multiple matches found:\n';
                    steffiHosts.forEach(h => output.textContent += `  • id ${h.id}: ${h.name}\n`);
                    output.textContent += '\nUpdate the script or use Admin → Edit Host manually.';
                    return;
                }

                const steffi = steffiHosts[0];
                await steffi.ref.update({ alternateFor: RENEE_ID });
                output.textContent += `✓ Updated ${steffi.name} (id ${steffi.id})\n`;
                output.textContent += `  alternateFor: ${RENEE_ID} (Renee V.)\n\n`;
                output.textContent += 'Refresh Admin → Manage Hosts to see the substitute label.';
            } catch (err) {
                output.textContent += 'Error: ' + err.message;
            }
        });
    </script>
</body>
</html>
